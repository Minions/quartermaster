name: Release

on:
  push:
    tags:
      - 'v*'

# Builds the Dominion installer for all platforms, signs the Windows binary
# via SignPath (once the project is enrolled), and publishes a GitHub Release.
#
# Repository variables used (Settings → Variables → Actions):
#   DOMINION_BUNDLE_URL    — versioned URL for the Dominion runtime bundle
#                            e.g. https://install.minions.tools/v1.2.0/dominion-bundle.zip
#   DOMINION_BUNDLE_SHA256 — SHA-256 hex of that zip (leave blank to skip verification)
#
# Repository secrets used (Settings → Secrets → Actions):
#   SIGNPATH_API_TOKEN     — SignPath CI user token (add when enrolled)

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add MinGW to PATH (required for Wails CGo build)
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Compute Volta SHA-256 (Windows zip)
        shell: bash
        run: |
          VOLTA_VERSION=$(grep '^const voltaVersion' launcher.go | grep -oP '"[0-9.]+"' | tr -d '"')
          curl -fsSLo volta.zip \
            "https://github.com/volta-cli/volta/releases/download/v${VOLTA_VERSION}/volta-${VOLTA_VERSION}-windows.zip"
          echo "VOLTA_WIN_SHA256=$(sha256sum volta.zip | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        env:
          DOMINION_BUNDLE_URL: ${{ vars.DOMINION_BUNDLE_URL }}
          DOMINION_BUNDLE_SHA256: ${{ vars.DOMINION_BUNDLE_SHA256 }}
        run: |
          LDFLAGS="-X main.voltaWindowsSHA256=${VOLTA_WIN_SHA256}"
          [ -n "$DOMINION_BUNDLE_URL" ]    && LDFLAGS="$LDFLAGS -X main.dominionBundleURL=${DOMINION_BUNDLE_URL}"
          [ -n "$DOMINION_BUNDLE_SHA256" ] && LDFLAGS="$LDFLAGS -X main.dominionBundleSHA256=${DOMINION_BUNDLE_SHA256}"
          wails build -platform windows/amd64 -o quartermaster-windows-amd64.exe \
            -ldflags "$LDFLAGS"

      # ── SignPath signing (enable once enrolled) ───────────────────────────
      # - name: Sign (Windows)
      #   uses: SignPath/github-actions-extensions@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: <your-signpath-org-id>
      #     project-slug: quartermaster
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: windows-exe
      #     github-artifact-id: ${{ steps.upload.outputs.artifact-id }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/bin/quartermaster-windows-amd64.exe

  # ── macOS ARM64 ────────────────────────────────────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Compute Volta SHA-256 (macOS arm64)
        run: |
          VOLTA_VERSION=$(grep '^const voltaVersion' launcher.go | grep -oE '"[0-9.]+"' | tr -d '"')
          curl -fsSLo volta.tar.gz \
            "https://github.com/volta-cli/volta/releases/download/v${VOLTA_VERSION}/volta-${VOLTA_VERSION}-macos-aarch64.tar.gz"
          echo "VOLTA_MAC_ARM64_SHA256=$(shasum -a 256 volta.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Build
        env:
          DOMINION_BUNDLE_URL: ${{ vars.DOMINION_BUNDLE_URL }}
          DOMINION_BUNDLE_SHA256: ${{ vars.DOMINION_BUNDLE_SHA256 }}
        run: |
          LDFLAGS="-X main.voltaMacARM64SHA256=${VOLTA_MAC_ARM64_SHA256}"
          [ -n "$DOMINION_BUNDLE_URL" ]    && LDFLAGS="$LDFLAGS -X main.dominionBundleURL=${DOMINION_BUNDLE_URL}"
          [ -n "$DOMINION_BUNDLE_SHA256" ] && LDFLAGS="$LDFLAGS -X main.dominionBundleSHA256=${DOMINION_BUNDLE_SHA256}"
          wails build -platform darwin/arm64 -o quartermaster-darwin-arm64 \
            -ldflags "$LDFLAGS"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: build/bin/quartermaster-darwin-arm64

  # ── macOS x86-64 ───────────────────────────────────────────────────────────
  build-mac-x86:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Compute Volta SHA-256 (macOS x86-64)
        run: |
          VOLTA_VERSION=$(grep '^const voltaVersion' launcher.go | grep -oE '"[0-9.]+"' | tr -d '"')
          curl -fsSLo volta.tar.gz \
            "https://github.com/volta-cli/volta/releases/download/v${VOLTA_VERSION}/volta-${VOLTA_VERSION}-macos.tar.gz"
          echo "VOLTA_MAC_X86_SHA256=$(shasum -a 256 volta.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Build
        env:
          DOMINION_BUNDLE_URL: ${{ vars.DOMINION_BUNDLE_URL }}
          DOMINION_BUNDLE_SHA256: ${{ vars.DOMINION_BUNDLE_SHA256 }}
        run: |
          LDFLAGS="-X main.voltaMacX86SHA256=${VOLTA_MAC_X86_SHA256}"
          [ -n "$DOMINION_BUNDLE_URL" ]    && LDFLAGS="$LDFLAGS -X main.dominionBundleURL=${DOMINION_BUNDLE_URL}"
          [ -n "$DOMINION_BUNDLE_SHA256" ] && LDFLAGS="$LDFLAGS -X main.dominionBundleSHA256=${DOMINION_BUNDLE_SHA256}"
          wails build -platform darwin/amd64 -o quartermaster-darwin-amd64 \
            -ldflags "$LDFLAGS"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x86
          path: build/bin/quartermaster-darwin-amd64

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac-arm64, build-mac-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          sha256sum quartermaster-windows-amd64.exe \
                    quartermaster-darwin-arm64 \
                    quartermaster-darwin-amd64 \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quartermaster-windows-amd64.exe
            quartermaster-darwin-arm64
            quartermaster-darwin-amd64
            SHA256SUMS.txt
          generate_release_notes: true
